<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seat Search</title>
    <style>
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            /* 1. 降低遮罩濃度至 0.1，讓照片更鮮豔 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)), 
                              url('https://github.com/eric8000lee/wedding/blob/main/background.jpg?raw=true');
            background-size: cover;
            /* 2. 靠頂端對齊，避免人臉被卡片完全擋住 */
            background-position: center; 
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .card { 
            /* 回復到你之前最滿意的 0.85 透明度，確保背景隱約可見但字體超清晰 */
            background: rgba(255, 255, 255, 0.85); 
            padding: 35px 20px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            /* 如果想避開人臉，可以微調這個數值 */
            margin-top: 40px; 
        }

        h1 { color: #8b5e3c; font-size: 26px; margin-bottom: 8px; letter-spacing: 1px; }
        p { color: #a68b7c; margin-bottom: 35px; font-size: 16px; }

        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #e0d5cf; 
            border-radius: 15px; 
            font-size: 18px; 
            margin-bottom: 20px; 
            outline: none; 
            box-sizing: border-box; 
            text-align: center;
        }

        button { 
            background-color: #c9a48c; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(201, 164, 140, 0.3);
        }

        #result { margin-top: 35px; min-height: 100px; color: #5d4037; font-size: 18px; }
        .table-num { font-size: 60px; color: #c9a48c; font-weight: bold; margin-top: 10px; display: block; }
        .error-msg { color: #d9534f; font-size: 16px; }
        .loading { color: #a68b7c; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Our Wedding</h1>
        <p>請輸入您的全名查詢桌次</p>
        <input type="text" id="nameInput" placeholder="例如：李宗儒" autocomplete="off">
        <button onclick="search()">查詢座位</button>
        <div id="result"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxB5HoaTu7L_QLl9GGeprR3mzz5zv-tfmxYnmkUS_Ctg7s7lAY_DtBj5BH95SR6e2Hv/exec';
        const TABLE_MAP_URL = 'https://github.com/eric8000lee/wedding/blob/main/table.png?raw=true';

        async function search() {
            const nameInput = document.getElementById('nameInput');
            const resultDiv = document.getElementById('result');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert("請輸入姓名後再查詢喔！");
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading">正在為您確認席位...</div>';
            
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(name)}`);
                const data = await response.json();

                if (data.table) {
                    // ✅ 修復處：將 currentMap 改為 TABLE_MAP_URL
                    resultDiv.innerHTML = `
                        <div style="margin-bottom:10px;">🌟 ${name} 您好！您的席位在</div>
                        <span class="table-num">${data.table}</span>
                        <div style="margin-top:25px; font-size:14px; color:#a68b7c; font-weight:bold;">⬇️ 會場桌次配置圖 ⬇️</div>
                        <img src="${TABLE_MAP_URL}" style="width:100%; border-radius:15px; margin-top:10px; border: 1px solid #e0d5cf; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error-msg">❌ 查無此姓名</div>
                        <div style="font-size: 14px; margin-top: 10px; color: #a68b7c;">請確認姓名是否正確，或洽現場工作人員</div>
                    `;
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = '<div class="error-msg">系統連線異常，請稍後再試</div>';
            }
        }
    </script>
</body>
</html>
