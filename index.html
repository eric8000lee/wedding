<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seat Search</title>
    <style>
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            /* 1. 降低背景遮罩的濃度 (從 0.4 降到 0.2)，讓照片更亮更清楚 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), 
                              url('https://github.com/eric8000lee/wedding/blob/main/background.jpg?raw=true');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        .card { 
            /* 2. 讓卡片更透明 (0.85 -> 0.6)，這樣背景照片會隱約穿透出來 */
            background: rgba(255, 255, 255, 0.6); 
            padding: 30px 20px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 360px; /* 3. 稍微縮窄卡片，讓背景露出的面積變大 */
            text-align: center; 
            /* 4. 降低模糊度 (8px -> 4px)，讓後面的照片細節清楚一點 */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        h1 { color: #8b5e3c; font-size: 26px; margin-bottom: 8px; letter-spacing: 1px; }
        p { color: #a68b7c; margin-bottom: 35px; font-size: 16px; }

        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #e0d5cf; 
            border-radius: 15px; 
            font-size: 18px; 
            margin-bottom: 20px; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
            text-align: center;
        }

        input:focus { border-color: #c9a48c; background: white; }

        button { 
            background-color: #c9a48c; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(201, 164, 140, 0.3);
        }

        button:active { transform: scale(0.98); }

        #result { 
            margin-top: 35px; 
            min-height: 100px; 
            color: #5d4037; 
            font-size: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .table-num { 
            font-size: 60px; 
            color: #c9a48c; 
            font-weight: bold; 
            margin-top: 10px; 
            display: block; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* 桌次平面圖樣式 */
        .table-map {
            width: 100%;
            margin-top: 25px;
            border-radius: 20px; /* 圓弧處理 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .error-msg { color: #d9534f; font-size: 16px; }
        .loading { color: #a68b7c; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Our Wedding</h1>
        <p>請輸入您的全名查詢桌次</p>
        <input type="text" id="nameInput" placeholder="例如：李宗儒" autocomplete="off">
        <button onclick="search()">查詢座位</button>
        <div id="result"></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxB5HoaTu7L_QLl9GGeprR3mzz5zv-tfmxYnmkUS_Ctg7s7lAY_DtBj5BH95SR6e2Hv/exec';
        // 你的桌次圖網址
        const TABLE_MAP_URL = 'https://github.com/eric8000lee/wedding/blob/main/table.png?raw=true';

        async function search() {
            const nameInput = document.getElementById('nameInput');
            const resultDiv = document.getElementById('result');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert("請輸入姓名後再查詢喔！");
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading">正在為您確認席位...</div>';
            
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(name)}`);
                const data = await response.json();

                if (data.table) {
                    resultDiv.innerHTML = `
                        <div>🌟 ${name} 您好！您的席位在</div>
                        <span class="table-num">${data.table}</span>
                        <div style="margin-top:20px; font-size:14px; color:#a68b7c; font-weight:bold;">⬇️ 座位圖標示如下 ⬇️</div>
                        <img src="${currentMap}" style="width:100%; border-radius:15px; margin-top:10px; border: 1px solid #e0d5cf;">
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error-msg">❌ 查無此姓名</div>
                        <div style="font-size: 14px; margin-top: 10px; color: #a68b7c;">請確認姓名是否正確，或洽現場工作人員</div>
                    `;
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = '<div class="error-msg">系統連線異常，請稍後再試</div>';
            }
        }
    </script>
</body>
</html>
