<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seat Search</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: #f8f1ed; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 50px 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #8b5e3c; font-size: 26px; margin-bottom: 8px; }
        p { color: #a68b7c; margin-bottom: 35px; }
        input { width: 100%; padding: 15px; border: 1px solid #e0d5cf; border-radius: 15px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #c9a48c; box-shadow: 0 0 0 3px rgba(201, 164, 140, 0.2); }
        button { background-color: #c9a48c; color: white; border: none; padding: 16px; border-radius: 15px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #b08968; transform: translateY(-2px); }
        #result { margin-top: 35px; min-height: 80px; color: #555; }
        .table-num { font-size: 48px; color: #c9a48c; font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Our Wedding</h1>
        <p>請輸入您的全名查詢桌次</p>
        <input type="text" id="nameInput" placeholder="請輸入姓名">
        <button onclick="search()">查詢座位</button>
        <div id="result"></div>
    </div>

    <script>
        // ⚠️ 這裡請換成你剛才截圖中看到的那個 /exec 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxB5HoaTu7L_QLl9GGeprR3mzz5zv-tfmxYnmkUS_Ctg7s7lAY_DtBj5BH95SR6e2Hv/exec';

        async function search() {
            const nameInput = document.getElementById('nameInput');
            const name = nameInput.value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!name) { alert("請輸入姓名！"); return; }
            
            resultDiv.innerHTML = "查詢中，請稍候...";
            
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(name)}`);
                const data = await response.json();

                if (data.table) {
                    resultDiv.innerHTML = `<div>${name} 您好，您的席位在</div><span class="table-num">${data.table}</span>`;
                } else {
                    resultDiv.innerHTML = "<div style='color: #e76f51;'>❌ 查無此姓名</div><small>請確認是否包含空格，或洽現場工作人員</small>";
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "系統連線異常，請稍後再試";
            }
        }
    </script>
</body>
</html>
