<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Seat Search</title>
    <style>
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            /* ⚠️ 替換區：請把下方的網址換成你照片的 raw 連結 */
            background-image: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), 
                              url('https://github.com/eric8000lee/wedding/blob/main/background.jpg?raw=true');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .card { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 50px 30px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        h1 { color: #8b5e3c; font-size: 26px; margin-bottom: 8px; letter-spacing: 1px; }
        p { color: #a68b7c; margin-bottom: 35px; font-size: 16px; }

        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #e0d5cf; 
            border-radius: 15px; 
            font-size: 18px; 
            margin-bottom: 20px; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
            text-align: center;
        }

        input:focus { border-color: #c9a48c; background: white; }

        button { 
            background-color: #c9a48c; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            font-size: 18px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(201, 164, 140, 0.3);
        }

        button:active { transform: scale(0.98); }

        #result { 
            margin-top: 35px; 
            min-height: 100px; 
            color: #5d4037; 
            font-size: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .table-num { 
            font-size: 60px; 
            color: #c9a48c; 
            font-weight: bold; 
            margin-top: 10px; 
            display: block; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .error-msg { color: #d9534f; font-size: 16px; }
        .loading { color: #a68b7c; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Our Wedding</h1>
        <p>請輸入您的全名查詢桌次</p>
        <input type="text" id="nameInput" placeholder="例如：李宗儒" autocomplete="off">
        <button onclick="search()">查詢座位</button>
        <div id="result"></div>
    </div>

    <script>
        // ⚠️ 替換區：請把下方的網址換成你 Google Apps Script 的 /exec 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxB5HoaTu7L_QLl9GGeprR3mzz5zv-tfmxYnmkUS_Ctg7s7lAY_DtBj5BH95SR6e2Hv/exec';

        async function search() {
            const nameInput = document.getElementById('nameInput');
            const resultDiv = document.getElementById('result');
            const name = nameInput.value.trim(); // .trim() 會自動刪掉前後多餘的空格
            
            if (!name) {
                alert("請輸入姓名後再查詢喔！");
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading">正在為您確認席位...</div>';
            
            try {
                // 發送請求到 Google
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(name)}`);
                const data = await response.json();

                if (data.table) {
                    resultDiv.innerHTML = `
                        <div>${name} 您好，您的席位在</div>
                        <span class="table-num">${data.table}</span>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error-msg">❌ 查無此姓名</div>
                        <div style="font-size: 14px; margin-top: 10px; color: #a68b7c;">請確認姓名是否正確，或洽現場工作人員</div>
                    `;
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = '<div class="error-msg">系統連線異常，請稍後再試</div>';
            }
        }
    </script>
</body>
</html>
